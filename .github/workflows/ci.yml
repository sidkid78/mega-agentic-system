name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (boot smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Import smoke test (must boot with NO key — BYOK)
        env:
          GEMINI_API_KEY: ""
          GOOGLE_API_KEY: ""
        run: uv run python -c "import api_server; print('backend imports OK (keyless)')"

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Informative but non-blocking — don't fail the build on lint nits.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8010
        run: npm run build
